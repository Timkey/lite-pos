<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Database Inspector</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            padding: 2rem;
            background: #1a1a1a;
            color: #e0e0e0;
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 { color: #4fc3f7; margin-bottom: 2rem; }
        h2 { color: #81c784; margin-top: 2rem; }
        .section {
            background: #2a2a2a;
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1rem 0;
            border: 1px solid #404040;
        }
        button {
            padding: 0.75rem 1.5rem;
            margin: 0.5rem 0.5rem 0.5rem 0;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        button:hover { background: #1565c0; }
        button.danger { background: #d32f2f; }
        button.danger:hover { background: #c62828; }
        button.success { background: #388e3c; }
        button.success:hover { background: #2e7d32; }
        pre {
            background: #1a1a1a;
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid #404040;
            max-height: 400px;
            overflow-y: auto;
        }
        .status {
            padding: 0.5rem 1rem;
            border-radius: 4px;
            margin: 0.5rem 0;
            font-weight: bold;
        }
        .status.success { background: #1b5e20; color: #a5d6a7; }
        .status.error { background: #b71c1c; color: #ef9a9a; }
        .status.warning { background: #e65100; color: #ffcc80; }
        .count { 
            display: inline-block;
            background: #1976d2;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            margin-left: 0.5rem;
            font-size: 0.9em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #404040;
        }
        th {
            background: #1a1a1a;
            color: #4fc3f7;
            font-weight: bold;
        }
        tr:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <h1>🔍 Safe Database Inspector (Read-Only)</h1>
    
    <div class="section">
        <h2>Database Status</h2>
        <button onclick="inspectDatabase()">Inspect Database</button>
        <button class="success" onclick="exportAllData()">Export All Data to JSON</button>
        <button class="success" onclick="document.getElementById('import-file').click()">Import Data from JSON</button>
        <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
        <div id="db-status"></div>
    </div>

    <div class="section">
        <h2>Data Summary</h2>
        <div id="data-summary"></div>
    </div>

    <div class="section">
        <h2>Sessions</h2>
        <div id="sessions-data"></div>
    </div>

    <div class="section">
        <h2>Tabs</h2>
        <div id="tabs-data"></div>
    </div>

    <div class="section">
        <h2>Line Items</h2>
        <div id="items-data"></div>
    </div>

    <div class="section">
        <h2>Events</h2>
        <div id="events-data"></div>
    </div>

    <div class="section">
        <h2>Raw Data Export</h2>
        <pre id="raw-export">Click "Export All Data" above to see full JSON</pre>
    </div>

    <script>
        let dbData = {};

        async function inspectDatabase() {
            const statusEl = document.getElementById('db-status');
            statusEl.innerHTML = '<div class="status warning">Inspecting database...</div>';

            try {
                // Check what databases exist
                const databases = await indexedDB.databases();
                console.log('Available databases:', databases);

                const shopDB = databases.find(db => db.name === 'ShopTrackerDB');
                
                if (!shopDB) {
                    statusEl.innerHTML = '<div class="status error">❌ ShopTrackerDB not found!</div>';
                    return;
                }

                // Open database WITHOUT specifying version (read whatever exists)
                const db = await new Promise((resolve, reject) => {
                    const request = indexedDB.open('ShopTrackerDB');
                    
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                    request.onupgradeneeded = (event) => {
                        // CRITICAL: Abort upgrade to prevent modifications
                        event.target.transaction.abort();
                        reject(new Error('Upgrade triggered - aborting to prevent data loss'));
                    };
                });

                const version = db.version;
                const stores = Array.from(db.objectStoreNames);
                
                statusEl.innerHTML = `
                    <div class="status success">✅ Database Found!</div>
                    <p><strong>Version:</strong> ${version}</p>
                    <p><strong>Object Stores:</strong> ${stores.length > 0 ? stores.join(', ') : 'NONE (Empty database!)'}</p>
                `;

                if (stores.length === 0) {
                    statusEl.innerHTML += '<div class="status error">⚠️ WARNING: Database has NO object stores - data cannot exist!</div>';
                    db.close();
                    return;
                }

                // Read all data from each store
                dbData = {};
                const summaryEl = document.getElementById('data-summary');
                let summaryHTML = '<table><tr><th>Store</th><th>Record Count</th><th>Status</th></tr>';

                for (const storeName of stores) {
                    try {
                        const tx = db.transaction(storeName, 'readonly');
                        const store = tx.objectStore(storeName);
                        
                        const data = await new Promise((resolve, reject) => {
                            const request = store.getAll();
                            request.onsuccess = () => resolve(request.result);
                            request.onerror = () => reject(request.error);
                        });

                        dbData[storeName] = data;
                        const count = data.length;
                        const status = count > 0 ? '✅ Has Data' : '⚠️ Empty';
                        summaryHTML += `<tr><td><strong>${storeName}</strong></td><td><span class="count">${count}</span></td><td>${status}</td></tr>`;

                        // Display data in respective sections
                        displayStoreData(storeName, data);

                    } catch (err) {
                        console.error(`Error reading ${storeName}:`, err);
                        summaryHTML += `<tr><td><strong>${storeName}</strong></td><td>-</td><td>❌ Error: ${err.message}</td></tr>`;
                    }
                }

                summaryHTML += '</table>';
                summaryEl.innerHTML = summaryHTML;

                db.close();
                console.log('Database closed safely');

            } catch (err) {
                console.error('Inspection error:', err);
                statusEl.innerHTML = `<div class="status error">❌ Error: ${err.message}</div>`;
            }
        }

        function displayStoreData(storeName, data) {
            const containerId = `${storeName === 'lineItems' ? 'items' : storeName}-data`;
            const container = document.getElementById(containerId);
            
            if (!container) return;

            if (data.length === 0) {
                container.innerHTML = '<p style="color: #ffcc80;">No records found</p>';
                return;
            }

            // Show first 10 records in table format
            const records = data.slice(0, 10);
            const keys = Object.keys(records[0]);
            
            let html = `<p><strong>Found ${data.length} record(s)</strong> (showing first 10)</p>`;
            html += '<table><tr>';
            
            keys.forEach(key => {
                html += `<th>${key}</th>`;
            });
            html += '</tr>';

            records.forEach(record => {
                html += '<tr>';
                keys.forEach(key => {
                    let value = record[key];
                    if (typeof value === 'object') {
                        value = JSON.stringify(value).substring(0, 50) + '...';
                    } else if (typeof value === 'string' && value.length > 50) {
                        value = value.substring(0, 50) + '...';
                    }
                    html += `<td>${value}</td>`;
                });
                html += '</tr>';
            });

            html += '</table>';
            container.innerHTML = html;
        }

        function exportAllData() {
            if (Object.keys(dbData).length === 0) {
                alert('Please inspect the database first!');
                return;
            }

            const exportData = {
                exportDate: new Date().toISOString(),
                database: 'ShopTrackerDB',
                data: dbData
            };

            // Show in page
            document.getElementById('raw-export').textContent = JSON.stringify(exportData, null, 2);

            // Download as file
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `shoptracker-backup-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);

            alert('Data exported! Check downloads folder.');
        }

        // Auto-inspect on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(inspectDatabase, 500);
        });

        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const text = await file.text();
                const importedData = JSON.parse(text);

                if (!importedData.data) {
                    alert('Invalid backup file format!');
                    return;
                }

                const confirmed = confirm(
                    `Import ${Object.keys(importedData.data).length} stores from backup?\n\n` +
                    `This will ADD data to the database (not replace existing data).\n\n` +
                    `Stores to import:\n${Object.keys(importedData.data).join(', ')}`
                );

                if (!confirmed) return;

                // Open database for writing
                const db = await new Promise((resolve, reject) => {
                    const request = indexedDB.open('ShopTrackerDB', 2);
                    
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        
                        // Create stores if they don't exist
                        if (!db.objectStoreNames.contains('sessions')) {
                            const sessionsStore = db.createObjectStore('sessions', { keyPath: 'sessionId' });
                            sessionsStore.createIndex('startTime', 'startTime', { unique: false });
                            sessionsStore.createIndex('status', 'status', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('tabs')) {
                            const tabsStore = db.createObjectStore('tabs', { keyPath: 'tabId' });
                            tabsStore.createIndex('sessionId', 'sessionId', { unique: false });
                            tabsStore.createIndex('status', 'status', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('lineItems')) {
                            const itemsStore = db.createObjectStore('lineItems', { keyPath: 'itemId' });
                            itemsStore.createIndex('tabId', 'tabId', { unique: false });
                            itemsStore.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('audioChunks')) {
                            const audioStore = db.createObjectStore('audioChunks', { keyPath: 'chunkId' });
                            audioStore.createIndex('sessionId', 'sessionId', { unique: false });
                            audioStore.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('products')) {
                            const productsStore = db.createObjectStore('products', { keyPath: 'productId' });
                            productsStore.createIndex('name', 'name', { unique: false });
                            productsStore.createIndex('unitPrice', 'unitPrice', { unique: false });
                        }
                        if (!db.objectStoreNames.contains('events')) {
                            const eventsStore = db.createObjectStore('events', { keyPath: 'eventId' });
                            eventsStore.createIndex('sessionId', 'sessionId', { unique: false });
                            eventsStore.createIndex('tabId', 'tabId', { unique: false });
                            eventsStore.createIndex('eventType', 'eventType', { unique: false });
                            eventsStore.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                        console.log('Database stores created during import');
                    };
                });

                let importCount = 0;
                let errorCount = 0;

                // Import each store's data
                for (const [storeName, records] of Object.entries(importedData.data)) {
                    if (!db.objectStoreNames.contains(storeName)) {
                        console.warn(`Store ${storeName} not found, skipping`);
                        continue;
                    }

                    try {
                        const tx = db.transaction(storeName, 'readwrite');
                        const store = tx.objectStore(storeName);

                        for (const record of records) {
                            try {
                                await new Promise((resolve, reject) => {
                                    const request = store.put(record); // Use put to update if exists
                                    request.onsuccess = () => resolve();
                                    request.onerror = () => reject(request.error);
                                });
                                importCount++;
                            } catch (err) {
                                console.error(`Error importing record to ${storeName}:`, err);
                                errorCount++;
                            }
                        }

                        await new Promise((resolve, reject) => {
                            tx.oncomplete = () => resolve();
                            tx.onerror = () => reject(tx.error);
                        });

                    } catch (err) {
                        console.error(`Error importing ${storeName}:`, err);
                        errorCount++;
                    }
                }

                db.close();

                alert(`Import complete!\n\n✅ Imported: ${importCount} records\n❌ Errors: ${errorCount}`);
                
                // Re-inspect to show new data
                setTimeout(inspectDatabase, 500);

            } catch (err) {
                console.error('Import error:', err);
                alert(`Import failed: ${err.message}`);
            }
        }
    </script>
</body>
</html>
